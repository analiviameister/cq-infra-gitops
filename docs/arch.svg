<svg width="900" viewBox="0 0 900 980" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d29922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#39d353" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ======== GITHUB CONTAINER ======== -->
  <rect x="30" y="28" width="840" height="148" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <!-- GitHub logo icon simplified -->
  <circle cx="54" cy="50" r="9" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="68" y="55" font-size="14" font-weight="600" fill="#e6edf3" letter-spacing="0.3">GitHub</text>

  <!-- Source Repo -->
  <rect x="50" y="68" width="170" height="90" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="50" y="68" width="170" height="6" rx="3" fill="#21262d"/>
  <text x="135" y="103" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Source Repo</text>
  <text x="135" y="121" font-size="10" fill="#8b949e" text-anchor="middle">Go API + Python App</text>
  <text x="135" y="138" font-size="10" fill="#58a6ff" text-anchor="middle">main / feature branches</text>

  <!-- GitHub Actions -->
  <rect x="268" y="68" width="184" height="90" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="268" y="68" width="184" height="6" rx="3" fill="#6e40c9" fill-opacity="0.6"/>
  <text x="360" y="103" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">GitHub Actions</text>
  <text x="360" y="121" font-size="10" fill="#8b949e" text-anchor="middle">docker build &amp; push</text>
  <text x="360" y="138" font-size="10" fill="#a371f7" text-anchor="middle">CI pipeline on push</text>

  <!-- GHCR -->
  <rect x="502" y="68" width="340" height="90" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="502" y="68" width="340" height="6" rx="3" fill="#1a7f37" fill-opacity="0.6"/>
  <text x="672" y="103" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">GHCR — GitHub Container Registry</text>
  <text x="672" y="121" font-size="10" fill="#8b949e" text-anchor="middle">ghcr.io/org/go-api:tag</text>
  <text x="672" y="138" font-size="10" fill="#3fb950" text-anchor="middle">ghcr.io/org/python-app:tag</text>

  <!-- Arrow: Repo → Actions -->
  <line x1="220" y1="113" x2="266" y2="113" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <!-- Arrow: Actions → GHCR -->
  <line x1="452" y1="113" x2="500" y2="113" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="476" y="108" font-size="9" fill="#3fb950" text-anchor="middle">push</text>

  <!-- ======== ARGOCD CONTAINER ======== -->
  <rect x="30" y="204" width="840" height="140" rx="14" fill="#161b22" stroke="#6e40c9" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="52" y="226" font-size="14" font-weight="600" fill="#a371f7" letter-spacing="0.3">ArgoCD</text>
  <text x="140" y="226" font-size="10" fill="#6e40c9">GitOps Continuous Delivery</text>

  <!-- ArgoCD Server -->
  <rect x="50" y="236" width="190" height="90" rx="10" fill="#0d1117" stroke="#6e40c9" stroke-width="1"/>
  <rect x="50" y="236" width="190" height="6" rx="3" fill="#6e40c9" fill-opacity="0.5"/>
  <text x="145" y="272" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">ArgoCD Server</text>
  <text x="145" y="290" font-size="10" fill="#8b949e" text-anchor="middle">sync + reconcile loop</text>
  <text x="145" y="307" font-size="10" fill="#a371f7" text-anchor="middle">watches Git repo</text>

  <!-- App of Apps -->
  <rect x="292" y="236" width="580" height="90" rx="10" fill="#0d1117" stroke="#d29922" stroke-width="1"/>
  <rect x="292" y="236" width="580" height="6" rx="3" fill="#d29922" fill-opacity="0.4"/>
  <text x="582" y="262" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">App of Apps Pattern</text>
  <!-- Sub apps listed -->
  <rect x="310" y="272" width="110" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="365" y="291" font-size="10" fill="#c9d1d9" text-anchor="middle">Go API</text>
  <text x="365" y="307" font-size="9" fill="#8b949e" text-anchor="middle">Application</text>

  <rect x="434" y="272" width="110" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="489" y="291" font-size="10" fill="#c9d1d9" text-anchor="middle">Python App</text>
  <text x="489" y="307" font-size="9" fill="#8b949e" text-anchor="middle">Application</text>

  <rect x="558" y="272" width="90" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="603" y="291" font-size="10" fill="#c9d1d9" text-anchor="middle">Redis</text>
  <text x="603" y="307" font-size="9" fill="#8b949e" text-anchor="middle">Application</text>

  <rect x="662" y="272" width="100" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="712" y="291" font-size="10" fill="#c9d1d9" text-anchor="middle">Prometheus</text>
  <text x="712" y="307" font-size="9" fill="#8b949e" text-anchor="middle">Application</text>

  <rect x="776" y="272" width="84" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="818" y="291" font-size="10" fill="#c9d1d9" text-anchor="middle">Grafana</text>
  <text x="818" y="307" font-size="9" fill="#8b949e" text-anchor="middle">Application</text>

  <!-- Arrow: Argo Server → App of Apps -->
  <line x1="240" y1="281" x2="290" y2="281" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Arrow: GHCR → ArgoCD (pulls image ref) -->
  <path d="M672 158 L672 188 L145 188 L145 235" fill="none" stroke="#3fb950" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <text x="440" y="183" font-size="9" fill="#3fb950" text-anchor="middle">image ref sync</text>

  <!-- Arrow: Source repo → ArgoCD (watches manifests) -->
  <path d="M135 158 L135 192 L100 192 L100 235" fill="none" stroke="#a371f7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-purple)"/>
  <text x="72" y="188" font-size="9" fill="#a371f7" text-anchor="middle">watch</text>

  <!-- ======== KUBERNETES KIND CLUSTER ======== -->
  <rect x="30" y="372" width="840" height="568" rx="14" fill="#161b22" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="52" y="396" font-size="14" font-weight="600" fill="#58a6ff" letter-spacing="0.3">Kubernetes</text>
  <text x="148" y="396" font-size="10" fill="#388bfd">kind cluster</text>

  <!-- External traffic label -->
  <text x="450" y="362" font-size="11" fill="#8b949e" text-anchor="middle">▼  tráfego externo  ▼</text>

  <!-- Arrow: App of Apps → K8s -->
  <path d="M582 326 L582 354 L450 354 L450 371" fill="none" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-purple)"/>

  <!-- INGRESS TRAEFIK -->
  <rect x="300" y="408" width="300" height="74" rx="10" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <rect x="300" y="408" width="300" height="7" rx="3" fill="#d29922" fill-opacity="0.5"/>
  <text x="450" y="440" font-size="13" font-weight="700" fill="#e6edf3" text-anchor="middle">Ingress — Traefik</text>
  <text x="450" y="458" font-size="10" fill="#8b949e" text-anchor="middle">IngressController — HTTP/S routing</text>
  <text x="450" y="473" font-size="10" fill="#d29922" text-anchor="middle">traefik.io/v1alpha1</text>

  <!-- ======== NAMESPACE: APPS ======== -->
  <rect x="48" y="510" width="540" height="300" rx="12" fill="#0d1117" stroke="#1d6f42" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="66" y="532" font-size="11" font-weight="600" fill="#3fb950">namespace: apps</text>

  <!-- Go API -->
  <rect x="66" y="544" width="200" height="100" rx="10" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <rect x="66" y="544" width="200" height="6" rx="3" fill="#238636" fill-opacity="0.7"/>
  <text x="166" y="575" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">Go API</text>
  <text x="166" y="593" font-size="10" fill="#8b949e" text-anchor="middle">Deployment + Service</text>
  <text x="166" y="610" font-size="10" fill="#58a6ff" text-anchor="middle">:8080  replicas: 2</text>
  <text x="166" y="628" font-size="9" fill="#8b949e" text-anchor="middle">ghcr.io/org/go-api:tag</text>

  <!-- Python App -->
  <rect x="296" y="544" width="200" height="100" rx="10" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <rect x="296" y="544" width="200" height="6" rx="3" fill="#238636" fill-opacity="0.7"/>
  <text x="396" y="575" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">Python App</text>
  <text x="396" y="593" font-size="10" fill="#8b949e" text-anchor="middle">Deployment + Service</text>
  <text x="396" y="610" font-size="10" fill="#58a6ff" text-anchor="middle">:5000  replicas: 2</text>
  <text x="396" y="628" font-size="9" fill="#8b949e" text-anchor="middle">ghcr.io/org/python-app:tag</text>

  <!-- Redis -->
  <rect x="66" y="664" width="430" height="124" rx="10" fill="#161b22" stroke="#f78166" stroke-width="1"/>
  <rect x="66" y="664" width="430" height="6" rx="3" fill="#f78166" fill-opacity="0.5"/>
  <text x="281" y="696" font-size="12" font-weight="700" fill="#ffa198" text-anchor="middle">Redis</text>
  <text x="281" y="714" font-size="10" fill="#8b949e" text-anchor="middle">StatefulSet + Service</text>
  <text x="281" y="731" font-size="10" fill="#58a6ff" text-anchor="middle">redis:7-alpine  :6379</text>
  <text x="281" y="748" font-size="10" fill="#8b949e" text-anchor="middle">cache / session store</text>
  <text x="281" y="765" font-size="9" fill="#f78166" text-anchor="middle">PersistentVolumeClaim</text>

  <!-- Arrows: Traefik → Apps -->
  <path d="M380 482 L280 482 L280 543" fill="none" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M430 482 L430 530 L396 530 L396 543" fill="none" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Arrow: Apps → Redis -->
  <line x1="166" y1="644" x2="200" y2="663" stroke="#f78166" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="396" y1="644" x2="362" y2="663" stroke="#f78166" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ======== NAMESPACE: MONITORING ======== -->
  <rect x="608" y="510" width="248" height="300" rx="12" fill="#0d1117" stroke="#1f6feb" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="626" y="532" font-size="11" font-weight="600" fill="#58a6ff">namespace: monitoring</text>

  <!-- Prometheus -->
  <rect x="626" y="544" width="212" height="100" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <rect x="626" y="544" width="212" height="6" rx="3" fill="#e3b341" fill-opacity="0.5"/>
  <text x="732" y="575" font-size="12" font-weight="700" fill="#e3b341" text-anchor="middle">Prometheus</text>
  <text x="732" y="593" font-size="10" fill="#8b949e" text-anchor="middle">Deployment + Service</text>
  <text x="732" y="610" font-size="10" fill="#58a6ff" text-anchor="middle">:9090</text>
  <text x="732" y="628" font-size="9" fill="#8b949e" text-anchor="middle">scrape interval: 15s</text>

  <!-- Grafana -->
  <rect x="626" y="664" width="212" height="124" rx="10" fill="#161b22" stroke="#f47067" stroke-width="1"/>
  <rect x="626" y="664" width="212" height="6" rx="3" fill="#f47067" fill-opacity="0.5"/>
  <text x="732" y="697" font-size="12" font-weight="700" fill="#ffa198" text-anchor="middle">Grafana</text>
  <text x="732" y="715" font-size="10" fill="#8b949e" text-anchor="middle">Deployment + Service</text>
  <text x="732" y="733" font-size="10" fill="#58a6ff" text-anchor="middle">:3000</text>
  <text x="732" y="751" font-size="10" fill="#8b949e" text-anchor="middle">datasource: Prometheus</text>
  <text x="732" y="769" font-size="9" fill="#f47067" text-anchor="middle">PersistentVolumeClaim</text>

  <!-- Arrow: Prometheus → Grafana -->
  <line x1="732" y1="644" x2="732" y2="663" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Arrow: Prometheus scrapes apps -->
  <path d="M626 594 L540 594 L540 544 L520 544" fill="none" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-amber)"/>
  <text x="573" y="584" font-size="9" fill="#e3b341" text-anchor="middle">scrape</text>

  <!-- Arrow: Traefik → Grafana (expose UI) -->
  <path d="M530 482 L732 482 L732 543" fill="none" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ======== LEGEND ======== -->
  <rect x="30" y="898" width="840" height="42" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="55" y="916" font-size="10" fill="#8b949e">Legend:</text>

  <line x1="110" y1="919" x2="138" y2="919" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="145" y="923" font-size="10" fill="#a371f7">ArgoCD deploy</text>

  <line x1="240" y1="919" x2="268" y2="919" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <text x="276" y="923" font-size="10" fill="#3fb950">image pull/sync</text>

  <line x1="380" y1="919" x2="408" y2="919" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="416" y="923" font-size="10" fill="#d29922">tráfego HTTP</text>

  <line x1="510" y1="919" x2="538" y2="919" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-amber)"/>
  <text x="546" y="923" font-size="10" fill="#e3b341">scrape métricas</text>

  <line x1="650" y1="919" x2="678" y2="919" stroke="#f78166" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="686" y="923" font-size="10" fill="#f78166">conexão Redis</text>

  <!-- sub-legend row 2 -->
  <text x="55" y="934" font-size="10" fill="#8b949e">━━</text>
  <text x="75" y="934" font-size="10" fill="#6e40c9">namespace boundary (dashed)</text>
  <text x="340" y="934" font-size="10" fill="#58a6ff">━━</text>
  <text x="360" y="934" font-size="10" fill="#58a6ff">Kubernetes cluster boundary</text>
</svg>
