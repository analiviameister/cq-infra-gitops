apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dash-apps
  namespace: monitoring
data:
  apps-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(up)",
              "refId": "A"
            }
          ],
          "title": "Targets UP",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "count(kube_pod_info)",
              "refId": "A"
            }
          ],
          "title": "Pods no cluster",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",image!=\"\"}[5m]))",
              "refId": "A"
            }
          ],
          "title": "CPU total",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 12, "y": 0 },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(container_memory_working_set_bytes{container!=\"\",image!=\"\"})",
              "refId": "A"
            }
          ],
          "title": "Memória total",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 16, "y": 0 },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(container_network_receive_bytes_total[5m]))",
              "refId": "A"
            }
          ],
          "title": "RX total",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 20, "y": 0 },
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(container_network_transmit_bytes_total[5m]))",
              "refId": "A"
            }
          ],
          "title": "TX total",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 5 },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (job) (up)",
              "legendFormat": "{{job}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "UP por job",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "CPU"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "cores"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Memory"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "bytes"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "RX"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "Bps"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "TX"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "Bps"
                  }
                ]
              }
            ]
          },
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 13 },
          "id": 8,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true,
            "sortBy": [
              {
                "desc": false,
                "displayName": "namespace"
              }
            ]
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (namespace,pod) (rate(container_cpu_usage_seconds_total{container!=\"\",image!=\"\"}[5m]))",
              "format": "table",
              "instant": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (namespace,pod) (container_memory_working_set_bytes{container!=\"\",image!=\"\"})",
              "format": "table",
              "instant": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "sum by (namespace,pod) (rate(container_network_receive_bytes_total[5m]))",
              "format": "table",
              "instant": true,
              "refId": "C"
            },
            {
              "editorMode": "code",
              "expr": "sum by (namespace,pod) (rate(container_network_transmit_bytes_total[5m]))",
              "format": "table",
              "instant": true,
              "refId": "D"
            },
            {
              "editorMode": "code",
              "expr": "max by (namespace,pod,phase) (kube_pod_status_phase{phase=~\"Pending|Running|Succeeded|Failed|Unknown\"} == 1)",
              "format": "table",
              "instant": true,
              "refId": "E"
            }
          ],
          "title": "Pods overview",
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true
                },
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "phase": 2,
                  "Value": 3,
                  "Value 1": 4,
                  "Value 2": 5,
                  "Value 3": 6
                },
                "renameByName": {
                  "phase": "Status",
                  "Value": "CPU",
                  "Value 1": "Memory",
                  "Value 2": "RX",
                  "Value 3": "TX"
                }
              }
            }
          ],
          "type": "table"
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "apps",
        "prometheus",
        "kubernetes"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Apps Overview",
      "version": 2
    }