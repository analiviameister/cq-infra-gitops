apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-text-display-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/analiviameister/cq-infra-gitops.git
    targetRevision: HEAD
    path: charts/app
    helm:
      valueFiles:
        - ../../helm/values/python-text-display-api.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true